<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة المنتجات - لوحة تحكم</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS خاص -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="crud container my-5 p-4 shadow-sm rounded">

    <!-- Header -->
    <div class="head text-center mb-4 pb-2 border-bottom">
        <h2>إدارة المنتجات</h2>
        <p>نظام متكامل لتخزين ومتابعة المنتجات</p>
    </div>

    <!-- Form Inputs -->
    <div class="row g-2 mb-3 inputs">
        <div class="col-md-4 col-12">
            <input type="text" id="productName" class="form-control" placeholder="اسم السلعة" required>
        </div>

        <div class="col-md-4 col-12 price-inputs d-flex gap-2">
            <input type="number" id="price" class="form-control" placeholder="السعر" onkeyup="getTotal()" min="0">
            <input type="number" id="discount" class="form-control" placeholder="الخصم" onkeyup="getTotal()" min="0" value="0">
            <small id="total" class="bg-success text-white p-2 rounded d-inline-block"></small>
        </div>

        <div class="col-md-2 col-12">
            <input type="number" id="count" class="form-control" placeholder="العدد" min="1" value="1">
        </div>

        <div class="col-md-2 col-12 d-grid">
            <button id="submit" class="btn btn-primary">إضافة المنتج</button>
        </div>
    </div>

    <!-- Search & Delete All -->
    <div class="d-flex flex-column flex-md-row justify-content-between mb-3">
        <input type="text" id="search" class="form-control mb-2 mb-md-0 w-md-50" placeholder="ابحث بالاسم" onkeyup="searchData(this.value)">
        <div id="deleteAllBtnContainer"></div>
    </div>

    <!-- Table -->
    <div class="table-responsive">
        <table class="table table-striped table-bordered align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>اسم السلعة</th>
                    <th>السعر</th>
                    <th>الخصم</th>
                    <th>العدد</th>
                    <th>الحساب (الإجمالي)</th>
                    <th>تعديل</th>
                    <th>حذف</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
